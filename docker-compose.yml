services:
  db:
    image: postgres:15
    container_name: fire-safety-rgr-db
    ports:
      - '5434:5432'
    volumes:
      - old-pg-data:/var/lib/postgresql/data
    networks:
      - fire-rgr-network

  backend:
    build: ./backend
    container_name: fire-safety-rgr-backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:ssps2005@db:5432/fire_safety_db
      JWT_SECRET: fire_safety_super_secret_key_2026
      PORT: 4000
      TELEGRAM_BOT_TOKEN: 8960225870:AAHSIo7rBZZIxK7A1FJWp_uo9qcePUcFbWE
      TELEGRAM_CHAT_ID: -5168417894
    ports:
      - '4001:4000'
      - '5556:5555'
    networks:
      - fire-rgr-network

  frontend:
    build: ./frontend
    container_name: fire-safety-rgr-frontend
    ports:
      - '3002:80'
    depends_on:
      - backend
    networks:
      - fire-rgr-network

volumes:
  old-pg-data:
    external: true
    name: fire-safety-app_pg-data

networks:
  fire-rgr-network:
    driver: bridge